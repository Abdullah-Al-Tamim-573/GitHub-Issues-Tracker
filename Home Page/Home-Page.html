<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker || Home</title>

    <!-- google font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- daisyUi and Taiwind Css CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- css file link -->
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <header class="bg-base-100 shadow-sm">
      <nav
        class="navbar py-2 flex-col gap-5 md:flex-row md:gap-0 w-11/12 mx-auto"
      >
        <div class="flex-1">
          <a class="flex flex-col md:flex-row gap-2 items-center">
            <img
              class="w-[45px]"
              src="../assets/github-logo.png"
              alt="github logo"
            />
            <span class="font-semibold text-[1.5rem]"
              >GitHub Issues Tracker</span
            >
          </a>
        </div>
        <div class="flex gap-2">
          <input
            type="text"
            placeholder="Search"
            class="input input-bordered w-full md:w-auto"
          />
          <button class="btn btn-primary">Search</button>
        </div>
      </nav>
    </header>

    <main class="max-w-[80%] mx-auto mt-5 md:mt-[60px]">
      <!-- filter btn section part -->
      <section id="filter-btn-parent" class="border p-5 md:p-[24px] flex flex-wrap gap-2 items-center">
        <button class="btn py-2 px-10">All</button>
        <button class="btn py-2 px-10">Open</button>
        <button class="btn py-2 px-10">Closed</button>
      </section>
    </main>
  </body>
</html>
