<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- <title>GitHub Issues Tracker  </title> -->
    <title>GitHub Issues Tracker || LogIn</title>

    <!-- google font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- daisyUi and Taiwind Css CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- css file link -->
    <link rel="stylesheet" href="./css/style.css" />
  </head>

  <body class="min-h-screen flex justify-center items-center">
    <!-- total login form main part -->
    <section
      id="total-login-form-main-parent"
      class="shadow-2xl p-10 w-[90%] md:w-[50%] lg:w-[50%] xl:w-[35%]"
    >
      <!-- github logo and GitHub Issues Tracker header part -->
      <div class="text-center space-y-4">
        <img class="mx-auto" src="./assets/github-logo.png" alt="github logo" />
        <div>
          <h1 class="text-[#1F2937] font-semibold text-[1.5rem]">
            GitHub Issues Tracker
          </h1>
          <p class="text-[#64748B]">Sign in to manage your issues</p>
        </div>
      </div>
      <br />
      <!-- input field username and password part -->
      <div class="space-y-1">
        <!-- username part -->
        <p class="font-medium text-[#1F2937]">Username</p>
        <input
          id="username-input-field"
          type="text"
          class="input validator w-full outline-none"
          required
          placeholder="Username"
          minlength="3"
          maxlength="30"
        />
        <p class="text-[#4A00FF] text-[14px] mb-5">Default: admin</p>

        <!-- password part -->
        <p class="font-medium text-[#1F2937]">Password</p>
        <input
          id="password-input-field"
          type="password"
          class="input validator w-full outline-none"
          required
          placeholder="Password"
        />
        <p class="text-[#4A00FF] text-[14px]">Default: admin123</p>
      </div>
      <br />
      <!-- sign in btn part -->
      <div>
        <button id="signInBtn" class="btn btn-primary w-full">Sign In</button>
      </div>

      <!-- divider part -->
      <div class="divider my-5">OR</div>

      <!-- Demo Credentials: and instruction part -->
      <div class="text-center flex flex-col items-center gap-6">
        <p class="text-[14px] text-[#64748B]">Demo Credentials:</p>
        <div>
          <div>
            <p>
              <span class="font-semibold text-[#1F2937]">Username:</span> admin
            </p>
            <p>
              <span class="font-semibold text-[#1F2937]">Password:</span>
              admin123
            </p>
          </div>
        </div>
      </div>
    </section>

    <script src="./js/loginPage.js"></script>
  </body>
</html>
